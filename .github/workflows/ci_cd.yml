name: Multi-Branch CI/CD

on:
  push:
    branches:
      - feature
      - dev
      - main

jobs:

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run lint
        run: pip install flake8 && flake8 .

      - name: Run tests
        run: pip install pytest && pytest
        env:
          PYTHONPATH: .

  build:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: mayank0832/my-app2:${{ github.sha }}

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Deploy to Dev EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          script: |
            docker pull mayank0832/my-app:${{ github.sha }}
            docker stop my-app || true
            docker rm my-app || true
            docker run -d -p 5000:5000 -e ENV=development --name my-app2 mayank0832/my-app2:${{ github.sha }}

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Prod EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            docker pull mayank0832/my-app2:${{ github.sha }}
            docker stop my-app2 || true
            docker rm my-app2 || true
            docker run -d -p 5000:5000 -e ENV=production --name my-app2 mayank0832/my-app2:${{ github.sha }}